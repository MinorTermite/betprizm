<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIZMBET Переехал!</title>
    <!-- Автоматический редирект через 5 секунд -->
    <meta http-equiv="refresh" content="5;url=https://minortermite.github.io/prizmbet-v2/">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a; /* Темный фон */
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .banner {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            max-width: 600px;
            width: 100%;
            border: 2px solid #3b82f6; /* Синяя обводка */
            position: relative;
            overflow: hidden;
        }
        .banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
        }
        h1 {
            margin-top: 0;
            font-size: 2.5rem;
            color: #f8fafc;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .highlight {
            color: #3b82f6;
            font-weight: bold;
        }
        .btn {
            display: inline-block;
            background: #3b82f6;
            color: #fff;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .btn:hover {
            background: #2563eb;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
        }
        .spinner {
            margin: 30px auto 0;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .new-url {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="banner">
        <h1>🚀 Внимание! Сайт переехал</h1>
        <p>Платформа <span class="highlight">PRIZMBET</span> обновилась до версии 2.0 и теперь располагается по новому адресу.<br><br>Вы будете автоматически перенаправлены на новый сайт через несколько секунд...</p>
        
        <a href="https://minortermite.github.io/prizmbet-v2/" class="btn">Перейти на Новый Сайт Руками</a>
        
        <div class="spinner"></div>

        <div class="new-url">Новый адрес: https://minortermite.github.io/prizmbet-v2/</div>
    </div>

    <script>
        // Резервный редирект на JS, если meta refresh не сработает
        setTimeout(() => {
            window.location.href = "https://minortermite.github.io/prizmbet-v2/";
        }, 5000);
    </script>
</body>
</html>
